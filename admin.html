 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RC Center Admin</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="css/login.css">

<style>

.admin-title{

    color:orange;

    text-align:center;

    margin-bottom:30px;

}

textarea{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#111;

    color:white;

    margin-bottom:20px;

}

</style>

</head>

<body>

<section class="login-section">

<div class="login-box">

    <!-- TITLE -->

    <h1 class="admin-title">

        RC Center Admin

    </h1>

    <!-- FESTIVAL SECTION -->

    <h3 class="text-warning mb-3">

        Add Festival

    </h3>

    <input
    type="text"
    id="year"
    class="form-control"
    placeholder="Festival Year">

    <input
    type="text"
    id="title"
    class="form-control mt-3"
    placeholder="Festival Title">

    <input
    type="text"
    id="instagram"
    class="form-control mt-3"
    placeholder="Instagram Link">

    <textarea
    id="description"
    placeholder="Festival Description"></textarea>

    <button
    onclick="saveFestival()"
    class="btn-login">

        Save Festival

    </button>

    <!-- REEL SECTION -->

    <h3 class="text-warning mt-5 mb-3">

        Add Reel

    </h3>

    <input
    type="text"
    id="reelYear"
    class="form-control"
    placeholder="Year Example: 2025">

    <input
    type="text"
    id="caption"
    class="form-control mt-3"
    placeholder="Reel Caption">

    <input
    type="text"
    id="reelLink"
    class="form-control mt-3"
    placeholder="Instagram Reel Link">

    <button
    onclick="addReel()"
    class="btn-login mt-3">

        Add Reel

    </button>

    <!-- LOGOUT -->

    <button
    onclick="logout()"
    class="btn btn-danger w-100 mt-4">

        Logout

    </button>

    <p id="message"
    class="text-warning mt-3"></p>

</div>

</section>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/admin.js"></script>

</body>
</html>
