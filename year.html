 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RC Center Year Gallery</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

    margin:0;
    padding:0;

    background:#111;

    color:white;

    font-family:Arial,sans-serif;

}

/* TOP */

.top{

    text-align:center;

    padding:50px 20px;

}

.top h1{

    color:orange;

    font-size:55px;

    font-weight:bold;

}

/* POSTS */

.posts{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:30px;

    padding:40px;

}

/* CARD */

.post-card{

    background:#222;

    border-radius:20px;

    padding:20px;

    text-align:center;

    transition:0.3s;

    box-shadow:0 0 10px rgba(255,165,0,0.2);

}

.post-card:hover{

    transform:translateY(-10px);

    box-shadow:0 0 25px orange;

}

/* IMAGE */

.post-card img{

    width:100%;

    border-radius:15px;

    margin-bottom:20px;

}

/* CAPTION */

.caption{

    color:orange;

    font-size:24px;

    margin-bottom:20px;

}

/* REEL ICON */

.reel-icon{

    font-size:70px;

    margin-bottom:20px;

}

/* BUTTON */

.btn-warning{

    padding:12px;

    border-radius:10px;

    font-weight:bold;

}

/* EMPTY */

.empty{

    text-align:center;

    color:gray;

    font-size:25px;

    padding:50px;

}

</style>

</head>

<body>

<!-- TOP -->

<div class="top">

    <h1 id="yearTitle">

        Loading...

    </h1>

</div>

<!-- POSTS -->

<div id="posts"
class="posts">

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

const db = firebase.firestore();

/* GET YEAR */

const params =
new URLSearchParams(window.location.search);

const year =
params.get("year");

/* TITLE */

document.getElementById("yearTitle")
.innerHTML =
year + " Celebrations";

/* LOAD POSTS */

db.collection("years")
.doc(year)
.collection("posts")
.get()

.then(function(data){

    let content = "";

    if(data.empty){

        content = `

        <div class="empty">

            No Posts Added Yet

        </div>

        `;

    }

    else{

        data.forEach(function(doc){

            const post = doc.data();

            /* PHOTO */

            if(post.type == "photo"){

                content += `

                <div class="post-card">

                    <img
                    src="${post.image}">

                    <h3 class="caption">

                        ${post.caption}

                    </h3>

                </div>

                `;

            }

            /* REEL */

            else{

                content += `

                <div class="post-card">

                    <div class="reel-icon">

                        🎬

                    </div>

                    <h3 class="caption">

                        ${post.caption}

                    </h3>

                    <a
                    href="${post.instagram}"
                    target="_blank"
                    class="btn btn-warning w-100">

                        Watch Reel

                    </a>

                </div>

                `;

            }

        });

    }

    document.getElementById("posts")
    .innerHTML = content;

})

.catch(function(error){

    console.log(error);

});

</script>

</body>
</html>
