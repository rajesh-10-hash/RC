 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RC Center Gallery</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

/* BODY */

body{

    margin:0;
    padding:0;

    background:#111;

    color:white;

    font-family:Arial,sans-serif;

}

/* TITLE */

.gallery-title{

    text-align:center;

    padding:50px 20px;

}

.gallery-title h1{

    color:orange;

    font-size:55px;

    font-weight:bold;

}

.gallery-title p{

    color:#ccc;

    font-size:20px;

}

/* YEAR GRID */

.year-container{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:30px;

    padding:40px;

}

/* YEAR CARD */

.year-card{

    background:#222;

    border-radius:20px;

    padding:35px;

    text-align:center;

    transition:0.3s;

    box-shadow:0 0 10px rgba(255,165,0,0.2);

}

.year-card:hover{

    transform:translateY(-10px);

    box-shadow:0 0 25px orange;

}

/* YEAR TEXT */

.year-card h2{

    color:orange;

    font-size:45px;

    font-weight:bold;

}

.year-card p{

    color:#ccc;

    margin:20px 0;

    font-size:18px;

}

/* BUTTON */

.btn-warning{

    padding:12px 25px;

    border-radius:10px;

    font-weight:bold;

}

/* EMPTY */

.empty{

    text-align:center;

    padding:50px;

    color:gray;

    font-size:25px;

}

</style>

</head>

<body>

<!-- TITLE -->

<div class="gallery-title">

    <h1>

        RC Center Celebrations

    </h1>

    <p>

        Explore Our Festival Journey

    </p>

</div>

<!-- YEARS -->

<div id="years"
class="year-container">

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

/* FIRESTORE */

const db = firebase.firestore();

/* LOAD YEARS */

db.collection("years")
.get()

.then((data)=>{

    let content = "";

    /* IF NO YEARS */

    if(data.empty){

        content = `

        <div class="empty">

            No Celebration Years Added Yet

        </div>

        `;

    }

    else{

        data.forEach((doc)=>{

            const year = doc.id;

            const info = doc.data();

            content += `

            <div class="year-card">

                <h2>

                    ${year}

                </h2>

                <p>

                    ${info.title}

                </p>

                <a
                href="year.html?year=${year}"
                class="btn btn-warning">

                    Open Gallery

                </a>

            </div>

            `;

        });

    }

    document.getElementById("years")
    .innerHTML = content;

})

.catch((error)=>{

    console.log(error);

});

</script>

</body>
</html>
