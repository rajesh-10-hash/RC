 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RC Center</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">

<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:'Poppins',sans-serif;

}

/* BODY */

body{

    background:#111;

    overflow-x:hidden;

}

/* HERO */

.hero{

    width:100%;
    height:100vh;

    background:
    linear-gradient(
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.7)
    ),

    url('images/background.jpg');

    background-size:cover;

    background-position:center;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

    position:relative;

}

/* NAVBAR */

.navbar{

    position:absolute;

    top:0;

    width:100%;

    padding:20px 50px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.logo{

    display:flex;

    align-items:center;

    gap:15px;

}

.logo img{

    width:70px;

    height:70px;

    border-radius:50%;

    box-shadow:0 0 20px orange;

}

.logo h2{

    color:white;

    font-weight:bold;

}

/* MENU */

.menu a{

    color:white;

    text-decoration:none;

    margin-left:25px;

    font-weight:500;

    transition:0.3s;

}

.menu a:hover{

    color:orange;

}

/* CONTENT */

.hero-content h1{

    color:white;

    font-size:75px;

    font-weight:700;

}

.hero-content h1 span{

    color:orange;

    text-shadow:0 0 20px orange;

}

.hero-content p{

    color:#ddd;

    margin-top:20px;

    font-size:22px;

}

/* BUTTON */

.hero-btn{

    display:inline-block;

    margin-top:30px;

    padding:15px 40px;

    background:orange;

    color:black;

    text-decoration:none;

    border-radius:50px;

    font-weight:bold;

    transition:0.3s;

}

.hero-btn:hover{

    transform:scale(1.1);

    box-shadow:0 0 25px orange;

}

/* MOBILE */

@media(max-width:768px){

.hero-content h1{

    font-size:45px;

}

.hero-content p{

    font-size:18px;

}

.navbar{

    flex-direction:column;

    gap:15px;

}

.menu{

    display:flex;

    gap:15px;

}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">

            <img src="images/logo.png">

            <h2>RC Center</h2>

        </div>

        <div class="menu">

            <a href="index.html">

                Home

            </a>

            <a href="gallery.html">

                Gallery

            </a>

            <a href="admin.html">

                Admin

            </a>

        </div>

    </div>

    <!-- CONTENT -->

    <div class="hero-content">

        <h1>

            Welcome To

            <span>

                RC Center

            </span>

        </h1>

        <p>

            Celebrating Vinayaka Chavithi
            With Unity, Culture & Friendship

        </p>

        <a
        href="gallery.html"
        class="hero-btn">

            Explore Journey

        </a>

    </div>

</section>

</body>
</html>
